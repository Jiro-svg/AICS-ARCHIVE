<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AICS Archive</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: darkslategrey;
}

/* NAVBAR */
.navbar {
  width: 100%;
  background-color: #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1000;
}

.logo {
  color: aqua;
  font-weight: bold;
  font-size: 18px;
}

.navbar ul {
  list-style: none;
  display: flex;
  padding: 0;
  margin: 0;
}

.navbar ul li {
  margin-left: 15px;
}

.navbar ul li a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.navbar ul li a:hover {
  color: aqua;
}

/* MAIN CONTAINER */
.container {
  width: 95%;
  max-width: 1200px;
  margin: 120px auto 40px auto;
  padding: 25px;
  background: rgba(240,248,255,0.95);
  border-radius: 10px;
}

/* SEARCH */
.search-container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}

.search-box {
  padding: 10px;
  width: 250px;
  border-radius: 25px;
  border: 2px solid #007BFF;
}

.search-button {
  padding: 10px 20px;
  border-radius: 25px;
  border: none;
  background: #007BFF;
  color: white;
  cursor: pointer;
}

/* CATEGORY */
.category-section {
  text-align: center;
  margin-top: 20px;
}

/* FILE GRID */
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.file-card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.file-card:hover {
  transform: translateY(-5px);
}

.file-card a {
  text-decoration: none;
  font-weight: bold;
  color: #007BFF;
}

/* FLOATING PLUS BUTTON */
.plus {
  position: fixed;
  bottom: 30px;
  right: 30px;
}

.plus-btn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: none;
  background: #28a745;
  color: white;
  font-size: 28px;
  cursor: pointer;
  box-shadow: 0 5px 10px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.plus-btn:hover {
  transform: scale(1.1);
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  width: 90%;
  max-width: 400px;
  margin: 100px auto;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.modal input, .modal select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

/* MOBILE FIX */
@media (max-width: 768px) {

  .navbar {
    flex-direction: column;
    align-items: flex-start;
  }

  .navbar ul {
    flex-direction: column;
    width: 100%;
  }

  .navbar ul li {
    margin: 5px 0;
  }

  .search-box {
    width: 100%;
  }

  .search-button {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">AICS ARCHIVE</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="programs.html">Programs</a></li>
    <li><a href="help.html">Help Center</a></li>
    <li><a href="aboutus.html">About Us</a></li>
  </ul>
</div>

<div class="container">

  <div class="search-container">
    <input type="text" id="searchBox" class="search-box" placeholder="Search file name...">
    <button class="search-button" onclick="loadFiles()">Search</button>
  </div>

  <div class="category-section">
    <label>Categories</label>
    <select id="category" onchange="loadFiles()">
      <option value="all">All Categories</option>
      <option value="ICT">ICT</option>
      <option value="HUMSS">HUMSS</option>
      <option value="ABM">ABM</option>
      <option value="BSENTREP">BSENTREP</option>
    </select>
  </div>

  <div id="fileList" class="file-grid"></div>

</div>

<div class="plus">
  <button class="plus-btn" onclick="openModal()">+</button>
</div>

<div class="modal" id="uploadModal">
  <div class="modal-content">
    <h3>Upload a File</h3>
    <form action="php/upload.php" method="POST" enctype="multipart/form-data">
      <select name="category" required>
        <option value="">-- Select Category --</option>
        <option value="ICT">ICT</option>
        <option value="HUMSS">HUMSS</option>
        <option value="ABM">ABM</option>
        <option value="BSENTREP">BSENTREP</option>
      </select>
      <input type="file" name="file" required>
      <button type="submit" name="upload">Upload</button>
      <button type="button" onclick="closeModal()">Cancel</button>
    </form>
  </div>
</div>

<script>
function openModal() {
  document.getElementById('uploadModal').style.display = 'block';
}

function closeModal() {
  document.getElementById('uploadModal').style.display = 'none';
}

function loadFiles() {
  AbortController                                                     ````````````````````````````````````````````````                                  ```   `1
  +
    const search = document.getElementById('se+archBox').value;
  const category = document.getElementById('category').value;

  fetch('php/list_files.php')
    .then(response => response.json())
    .then(data => {
      const list = document.getElementById('fileList');
      list.innerHTML = '';

      const filtered = data.filter(file =>
        (category === 'all' || file.category === category) &&
        file.name.toLowerCase().includes(search.toLowerCase())
      );

      if (filtered.length === 0) {
        list.innerHTML = '<p>No files found.</p>';
      } else {
        filtered.forEach(file => {
          const card = document.createElement('div');
          card.className = 'file-card';

          const link = document.createElement('a');
          link.href = file.path;
          link.textContent = file.name;
          link.target = "_blank";

          card.appendChild(link);
          list.appendChild(card);
        });
      }
    });
}

window.onload = loadFiles;
</script>

</body>
</html>

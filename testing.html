<!DOCTYPE html> 
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AICS Archive</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: darkslategrey;
}

/* NAVBAR */
.navbar {
  width: 100%;
  background-color: #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1000;
}

.logo {
  color: aqua;
  font-weight: bold;
  font-size: 18px;
}

/* MENU BUTTON */
.menu-toggle {
  display: none;
  font-size: 28px;
  color: white;
  cursor: pointer;
}

/* NAV LINKS */
.nav-links {
  list-style: none;
  display: flex;
  padding: 0;
  margin: 0;
}

.nav-links li {
  margin-left: 15px;
}

.nav-links li a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.nav-links li a:hover {
  color: aqua;
}

/* MOBILE NAV */
@media (max-width: 768px) {
  .menu-toggle {
    display: block;
  }

  .nav-links {
    display: none;
    flex-direction: column;
    width: 100%;
    background-color: #222;
    margin-top: 10px;
    padding: 10px 0;
  }

  .nav-links li {
    margin: 10px 0;
    text-align: left;
    padding-left: 10px;
  }

  .nav-links.show {
    display: flex;
  }
}

/* MAIN CONTAINER */
.container {
  width: 95%;
  max-width: 1200px;
  margin: 120px auto 40px auto;
  padding: 25px;
  background: rgba(240,248,255,0.95);
  border-radius: 10px;
}

/* SEARCH */
.search-container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}

.search-box {
  padding: 10px;
  width: 250px;
  border-radius: 25px;
  border: 2px solid #007BFF;
}

.search-button {
  padding: 10px 20px;
  border-radius: 25px;
  border: none;
  background: #007BFF;
  color: white;
  cursor: pointer;
}

/* CATEGORY */
.category-section {
  text-align: center;
  margin-top: 20px;
}

/* FILE GRID */
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.file-card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: 0.3s;
  position: relative;
}

.file-card:hover {
  transform: translateY(-5px);
}

.file-card a {
  text-decoration: none;
  font-weight: bold;
  color: #007BFF;
  display: block;
  margin-bottom: 10px;
}

/* DELETE BUTTON */
.delete-btn {
  background: #dc3545;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  width: 100%;
  transition: 0.3s;
}

.delete-btn:hover {
  background: #c82333;
}

/* CONFIRM MODAL */
.confirm-modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 2000;
}

.confirm-content {
  background: white;
  width: 90%;
  max-width: 400px;
  margin: 200px auto;
  padding: 30px;
  border-radius: 10px;
  text-align: center;
}

.confirm-buttons {
  margin-top: 20px;
}

.confirm-yes {
  background: #dc3545;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
  margin-right: 10px;
}

.confirm-no {
  background: #6c757d;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
}

/* FLOATING PLUS BUTTON */
.plus {
  position: fixed;
  bottom: 30px;
  right: 30px;
}

.plus-btn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: none;
  background: #28a745;
  color: white;
  font-size: 28px;
  cursor: pointer;
  box-shadow: 0 5px 10px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.plus-btn:hover {
  transform: scale(1.1);
}

/* UPLOAD MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 1500;
}

.modal-content {
  background: white;
  width: 90%;
  max-width: 400px;
  margin: 100px auto;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.modal input, .modal select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">AICS ARCHIVE</div>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="help.html">Help Center</a></li>
    <li><a href="aboutus.html">About Us</a></li>
  </ul>
</div>

<div class="container">
  <div class="search-container">
    <input type="text" id="searchBox" class="search-box" placeholder="Search file name...">
    <button class="search-button" onclick="loadFiles()">Search</button>
  </div>

  <div class="category-section">
    <label>Categories</label>
    <select id="category" onchange="loadFiles()">
      <option value="all">All Categories</option>
      <option value="ICT">ICT</option>
      <option value="HUMSS">HUMSS</option>
      <option value="ABM">ABM</option>
    </select>
  </div>

  <div id="fileList" class="file-grid"></div>
</div>

<div class="plus">
  <button class="plus-btn" onclick="openModal()">+</button>
</div>

<!-- UPLOAD MODAL -->
<div class="modal" id="uploadModal">
  <div class="modal-content">
    <h3>Upload a File</h3>
    <form action="php/upload.php" method="POST" enctype="multipart/form-data">
      <select name="category" required>
        <option value="">-- Select Category --</option>
        <option value="ICT">ICT</option>
        <option value="HUMSS">HUMSS</option>
        <option value="ABM">ABM</option>
      </select>
      <input type="file" name="file" required>
      <button type="submit" name="upload">Upload</button>
      <button type="button" onclick="closeModal()">Cancel</button>
    </form>
  </div>
</div>

<!-- CONFIRM DELETE MODAL -->
<div class="confirm-modal" id="confirmModal">
  <div class="confirm-content">
    <h3>Confirm Delete</h3>
    <p>Are you sure you want to delete <strong id="fileToDelete"></strong>?</p>
    <div class="confirm-buttons">
      <button class="confirm-yes" onclick="confirmDelete()">Yes, Delete</button>
      <button class="confirm-no" onclick="cancelDelete()">Cancel</button>
    </div>
  </div>
</div>

<script>
let fileToDelete = '';

function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("show");
}

function openModal() {
  document.getElementById('uploadModal').style.display = 'block';
}

function closeModal() {
  document.getElementById('uploadModal').style.display = 'none';
}

function showConfirmDelete(filename) {
  fileToDelete = filename;
  document.getElementById('fileToDelete').textContent = filename;
  document.getElementById('confirmModal').style.display = 'block';
}

function cancelDelete() {
  document.getElementById('confirmModal').style.display = 'none';
  fileToDelete = '';
}

function confirmDelete() {
  fetch('php/delete_file.php', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
    },
    body: 'filename=' + encodeURIComponent(fileToDelete)
  })
  .then(response => response.json())
  .then(data => {
    if (data.success) {
      alert('File deleted successfully!');
      loadFiles(); // Refresh the file list
    } else {
      alert('Error deleting file: ' + data.error);
    }
    cancelDelete();
  })
  .catch(error => {
    alert('Error: ' + error);
    cancelDelete();
  });
}

function loadFiles() {
  const search = document.getElementById('searchBox').value;
  const category = document.getElementById('category').value;

  fetch('php/list_files.php')
    .then(response => response.json())
    .then(data => {
      const list = document.getElementById('fileList');
      list.innerHTML = '';

      const filtered = data.filter(file =>
        (category === 'all' || file.category === category) &&
        file.name.toLowerCase().includes(search.toLowerCase())
      );

      if (filtered.length === 0) {
        list.innerHTML = '<p>No files found.</p>';
      } else {
        filtered.forEach(file => {
          const card = document.createElement('div');
          card.className = 'file-card';

          const link = document.createElement('a');
          link.href = file.path;
          link.textContent = file.name;
          link.target = "_blank";

          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'delete-btn';
          deleteBtn.textContent = 'Delete';
          deleteBtn.onclick = () => showConfirmDelete(file.name);

          card.appendChild(link);
          card.appendChild(deleteBtn);
          list.appendChild(card);
        });
      }
    })
    .catch(error => {
      console.error('Error:', error);
      document.getElementById('fileList').innerHTML = '<p>Error loading files.</p>';
    });
}

window.onload = loadFiles;
</script>

</body>
</html>
